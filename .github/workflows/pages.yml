name: Deploy API docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Graphviz (dot executable required by PlantUML diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install frontend dependencies and Playwright browser
        working-directory: optimistic-locking-ui
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build (tests, REST Docs snippets, Modulith docs, Asciidoctor, overview screenshot)
        run: ./mvnw --batch-mode --no-transfer-progress package

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: optimistic-locking-web/target/generated-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
