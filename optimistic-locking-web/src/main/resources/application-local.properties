# Activated via -Dspring-boot.run.profiles=local (see LocalDevAuthConfig/DevLoginController).
# Fixed port, matching LineControllerITTest's own DEFINED_PORT setup: the resource server's
# JwtDecoder is built from jwk-set-uri well before the embedded server would publish an actual
# bound port, so this must be a fixed, known value rather than ${local.server.port}.
server.port=8080

# Matches JwsBuilder.DEFAULT_ISSUER exactly -- every demo token DevLoginController mints carries
# this issuer claim.
jeap.security.oauth2.resourceserver.authorization-server.issuer=http://localhost/auth
# Points the resource server directly at the mock JWKS endpoint LocalDevAuthConfig registers,
# bypassing OIDC discovery entirely (the issuer above is never dereferenced).
jeap.security.oauth2.resourceserver.authorization-server.jwk-set-uri=http://localhost:8080/.well-known/jwks.json
