spring.application.name=optimistic-locking

spring.jpa.open-in-view=false
# RFC 9457 application/problem+json bodies for MVC-level failures (bad JSON, wrong method, ...).
# Combined with the domain exceptions extending ErrorResponseException (see line/LineNotFound and
# friends), every error response in this app -- framework or domain -- comes back as a ProblemDetail.
spring.mvc.problemdetails.enabled=true

# Activates semantic role authorization (system_%tenant_@resource_#operation), e.g. line_#create.
jeap.security.oauth2.resourceserver.system-name=wvs
# Placeholder for this demo; point at a real Keycloak realm in an actual deployment.
jeap.security.oauth2.resourceserver.authorization-server.issuer=https://keycloak.example.ch/auth/realms/wvs

# jeap-spring-boot-monitoring-starter ships with placeholder Prometheus/actuator Basic-auth
# passwords that match no real value -- fine for this demo (nothing scrapes this app's actuator),
# but a real deployment must override jeap.monitor.prometheus.password/actuator.password.
# Every request is sampled so the tracing concept (see index.adoc) is visible on every log line,
# not just 1-in-10 by Spring Boot's own default -- fine at this app's traffic volume, but a real,
# high-traffic deployment would normally sample below 1.0.
management.tracing.sampling.probability=1.0
# Suppressed by default (would be noisy in production); enabled here so RestRequestTracer's
# method/URI/status/caller/user/elapsed-time line is actually visible for every request.
logging.level.ch.admin.bit.jeap.log.RestRequestTracer=DEBUG
# Also log unhandled exceptions the RestRequestTracer filter sees (this app maps every exception
# it knows about to a ProblemDetail via ApiExceptionHandler, so in practice this only ever fires
# for a genuinely unexpected bug).
jeap.logging.rest.unhandled-exception-logging.enabled=true
