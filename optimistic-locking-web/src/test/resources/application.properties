spring.application.name=optimistic-locking

jeap.security.oauth2.resourceserver.system-name=wvs
# Matches JwsBuilder.DEFAULT_ISSUER. jwk-set-uri is left at its default here (unreachable, but
# never dereferenced by a context-load-only test); LineControllerITTest overrides it to point at
# the mock JWKS endpoint that JeapOAuth2IntegrationTestResourceConfiguration registers.
jeap.security.oauth2.resourceserver.authorization-server.issuer=http://localhost/auth

# Mirrors src/main/resources/application.properties: LineControllerITTest$LoggingAndTracing
# asserts on RestRequestTracer's DEBUG log line and on every request getting its own traceId, so
# both need to be active for the test's Spring context too (this file shadows main's, it doesn't
# merge with it).
management.tracing.sampling.probability=1.0
logging.level.ch.admin.bit.jeap.log.RestRequestTracer=DEBUG
